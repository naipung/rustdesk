cd /e/DwnlData/github.com/v1.2/rustdesk

# 创建新的 build.yml（简化版）
cat > .github/workflows/build.yml << 'EOF'
name: RustDesk Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Inject Custom Config
        shell: bash
        run: |
          python inject_secrets.py "${{ secrets.MY_SERVER }}" "${{ secrets.MY_KEY }}"

      - name: Verify Config
        shell: bash
        run: |
          echo "=== 验证配置注入 ==="
          grep "RENDEZVOUS_SERVERS" libs/hbb_common/src/config.rs | head -1
          grep "RS_PUB_KEY" libs/hbb_common/src/config.rs | head -1

      - name: Build RustDesk
        run: |
          python build.py --flutter --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows
          path: target/release/rustdesk.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libpulse-dev

      - name: Inject Custom Config
        shell: bash
        run: |
          python inject_secrets.py "${{ secrets.MY_SERVER }}" "${{ secrets.MY_KEY }}"

      - name: Verify Config
        shell: bash
        run: |
          echo "=== 验证配置注入 ==="
          grep "RENDEZVOUS_SERVERS" libs/hbb_common/src/config.rs | head -1
          grep "RS_PUB_KEY" libs/hbb_common/src/config.rs | head -1

      - name: Build RustDesk
        run: |
          python build.py --flutter --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux
          path: target/release/rustdesk
EOF